---
# Source: joy-generator-chart/templates/argocd-config.yaml
apiVersion: v1
data:
  baseUrl: http://my-release-joy-generator-chart
  requestTimeout: "30"
  token: $my-release-joy-generator-chart-config:PLUGIN_TOKEN
kind: ConfigMap
metadata:
  name: my-release-joy-generator-chart-config
---
# Source: joy-generator-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: my-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: joy-generator-chart
    app.kubernetes.io/version: 1.0.0
    helm.sh/chart: joy-generator-chart-1.0.0
  name: my-release-joy-generator-chart
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: my-release
      app.kubernetes.io/name: joy-generator-chart
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: my-release
        app.kubernetes.io/name: joy-generator-chart
    spec:
      containers:
        - env:
            - name: CATALOG_DIR
              value: /tmp/catalog
            - name: CATALOG_URL
              value: https://github.com/example/foobar.git
            - name: GH_APP_ID
              value: "123"
            - name: GH_APP_INSTALLATION_ID
              value: "666"
            - name: GRACE_PERIOD
              value: 10s
            - name: PORT
              value: :8080
            - name: GH_APP_PRIVATE_KEY_PATH
              value: /etc/joy/config/githubApp.pem
          envFrom:
            - secretRef:
                name: my-release-joy-generator-chart-config
          image: ghcr.io/nestoca/joy-generator:0.1.2
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 1
          name: joy-generator-chart
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/v1/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 1
          resources: {}
          securityContext: {}
          volumeMounts:
            - mountPath: /tmp/catalog
              name: catalog-dir
            - mountPath: /etc/joy/config
              name: github-app-private-key
      securityContext: {}
      volumes:
        - emptyDir: {}
          name: catalog-dir
        - name: github-app-private-key
          secret:
            secretName: my-release-joy-generator-chart-github-app-key
---
# Source: joy-generator-chart/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: my-release-joy-generator-chart-config
stringData:
  PLUGIN_TOKEN: '@very!l0ngands3curet0ken'
---
apiVersion: v1
kind: Secret
metadata:
  name: my-release-joy-generator-chart-github-app-key
stringData:
  githubApp.pem: FOOBARLOREMISPUM
---
# Source: joy-generator-chart/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: my-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: joy-generator-chart
    app.kubernetes.io/version: 1.0.0
    helm.sh/chart: joy-generator-chart-1.0.0
  name: my-release-joy-generator-chart
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
  selector:
    app.kubernetes.io/instance: my-release
    app.kubernetes.io/name: joy-generator-chart
  type: ClusterIP